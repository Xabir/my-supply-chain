<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Panel - Supply Chain</title>
    <style>
        body{ font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .container{ max-width: 500px; margin: auto; }
        .card{ background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h2{ color: #1a2a6c; text-align: center; margin-top: 0; }
        input, select{ width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn{ width: 100%; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-blue{ background: #1a2a6c; color: white; width: 100%; padding: 14px; font-size: 16px; }
        .btn-green{ background: #27ae60; color: white; flex: 1; font-size: 13px; }
        .btn-orange{ background: #f39c12; color: white; flex: 1; font-size: 13px; }
        .btn-logout{ background: #e74c3c; color: white; margin-top: 20px; width: 100%; font-size: 14px; }
        
        .order-group-card{ background: #ffffff; border-radius: 12px; margin-bottom: 15px; border: 1px solid #bbc6f2; border-left: 7px solid #001a68; cursor: pointer; overflow: hidden; box-shadow: 0 6px 15px rgba(0,0,0,0.18); transition: 0.3s; }
        .order-group-card.new-order { border-left: 5px solid #3498db; background: #f0f7ff; }
        
        .group-header{ padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .group-id{ font-weight: bold; color: #1a2a6c; font-size: 17px; }

        .breakdown-section{ display: none; padding: 15px; background: #fff; border-top: 1px solid #eee; }
        .breakdown-section.active { display: block; }

        .admin-details { background: #eef2ff; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; border: 1px solid #c7d2fe; line-height: 1.5; }
        
        .point-card{ border: 1px solid #eee; padding: 12px; border-radius: 8px; margin-bottom: 10px; background: #fafafa; }
        .point-name{ font-weight: bold; color: #333; display: block; margin-bottom: 8px; }
        
        .qty-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; font-size: 12px; margin-bottom: 10px; background: #fff; padding: 8px; border-radius: 4px; border: 1px solid #eee; text-align: center;}
        .qty-row b { color: #1a2a6c; display: block; font-size: 14px; }

        .waiting-status { background: #fff3e0; padding: 10px; border-radius: 6px; font-size: 13px; color: #e65100; margin-bottom: 10px; border: 1px solid #ffe0b2; text-align: center; font-weight: bold; }

        .action-btns { display: flex; gap: 8px; margin-top: 10px; }
        .partial-input-box { background: #fff9c4; padding: 10px; border-radius: 6px; margin-top: 10px; border: 1px solid #fbc02d; display: none; }

        .log-box { font-size: 11px; color: #666; margin-top: 10px; border-top: 1px dashed #ccc; padding-top: 5px; }
        .new-badge { font-size: 10px; background: #3498db; color: white; padding: 2px 6px; border-radius: 10px; margin-left: 5px; }

        #vDashboard{ display: none; }

        /* ট্রান্সপোর্ট টাইপ সিলেকশন স্টাইল */
        .transport-select { background: #e8f5e9; border: 1px solid #2e7d32; font-size: 14px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="loginBox">
        <h2>🚚 ভেন্ডর লগইন</h2>
        <input type="text" id="vAuthMobile" placeholder="মোাবাইল নম্বর" maxlength="11">
        <button class="btn btn-blue" onclick="vendorLogin()">প্রবেশ করুন</button>
    </div>

    <div id="vDashboard">
        <div class="card" style="background: #1a2a6c; color: white; border-radius: 15px; margin-bottom: 20px;">
            <h3 id="vWelcome" style="margin:0;">স্বাগতম!</h3>
            <p id="vPhone" style="margin:5px 0 0 0; opacity: 0.8; font-size: 14px;"></p>
        </div>

        <h3 style="margin: 0 0 15px 5px; color: #333;">📦 আমার ওয়ার্ক অর্ডার সমূহ</h3>
        <div id="vendorOrders"></div>

        <button class="btn btn-logout" onclick="logout()">লগআউট</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://my-supply-chain-7a286-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.vendorLogin = async () => {
        const mobile = document.getElementById('vAuthMobile').value;
        if(mobile.length < 11) return alert("সঠিক মোবাইল নম্বর দিন");
        const vSnap = await get(ref(db, 'vendors/' + mobile));
        if(vSnap.exists()){
            localStorage.setItem('vendorMobile', mobile);
            showDashboard(vSnap.val().name, mobile);
        } else { alert("ভেন্ডর পাওয়া যায়নি"); }
    };

    function showDashboard(name, mobile) {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('vDashboard').style.display = 'block';
        document.getElementById('vWelcome').innerText = "স্বাগতম, " + name;
        document.getElementById('vPhone').innerText = "মোবাইল: " + mobile;
        loadVendorOrders(mobile);
    }

    window.toggleOrder = (orderKey) => {
        const el = document.getElementById('details-' + orderKey);
        el.classList.toggle('active');
    };

    function loadVendorOrders(vMobile) {
        onValue(ref(db, 'grouped_orders'), snap => {
            const container = document.getElementById('vendorOrders');
            container.innerHTML = "";
            if(!snap.exists()) return;

            let orderList = [];
            snap.forEach(child => {
                orderList.push({ key: child.key, data: child.val() });
            });
            orderList.reverse(); 

            orderList.forEach(item => {
                const order = item.data;
                const orderKey = item.key;
                const d = order.details || {};
                const unitStr = d.unit || 'pc'; 
                
                let hasPart = false;
                let isBrandNew = true; 
                let breakdownsHTML = "";

                order.breakdown.forEach((b, index) => {
                    if(b.vKey === vMobile) {
                        hasPart = true;
                        const totalReq = parseFloat(String(b.qty).replace(/[^\d.]/g, '')) || 0;
                        const confirmedQty = parseFloat(String(b.sentQty).replace(/[^\d.]/g, '')) || 0; 
                        const waitingQty = parseFloat(String(b.waitingQty).replace(/[^\d.]/g, '')) || 0; 
                        const remaining = totalReq - confirmedQty - waitingQty;
                        
                        if(confirmedQty > 0 || waitingQty > 0) isBrandNew = false;

                        let historyLog = "";
                        if(b.deliveryLogs){
                            historyLog = Object.values(b.deliveryLogs).reverse().map(l => 
                                `<div>• ${l.date}: <b>${l.amount} ${unitStr}</b> Received ✅</div>`
                            ).join('');
                        }

                        breakdownsHTML += `
                            <div class="point-card">
                                <span class="point-name">📍 ${b.pName}</span>
                                <div class="qty-row">
                                    <div>ডিমান্ড<br><b>${totalReq}</b></div>
                                    <div>কনফার্মড<br><b style="color:green">${confirmedQty}</b></div>
                                    <div>বাকি<br><b style="color:red">${remaining}</b></div>
                                </div>
                                
                                ${waitingQty > 0 ? `
                                    <div class="waiting-status">
                                        ⏳ ${waitingQty} Waiting for Confirmation
                                    </div>
                                ` : ''}

                                ${remaining > 0 ? `
                                    <!-- ট্রান্সপোর্ট টাইপ ড্রপডাউন -->
                                    <select id="transport_${orderKey}_${index}" class="transport-select" onclick="event.stopPropagation()">
                                        <option value="">-- ট্রান্সপোর্ট টাইপ সিলেক্ট করুন --</option>
                                        <option value="Courier">Courier</option>
                                        <option value="Own Transport">Own Transport</option>
                                    </select>

                                    <div class="action-btns">
                                        <button class="btn btn-green" onclick="event.stopPropagation(); shipOrder('${orderKey}', ${index}, ${remaining}, true, '${unitStr}')">Full Ship</button>
                                        <button class="btn btn-orange" onclick="event.stopPropagation(); showPartialBox('${orderKey}_${index}')">Partial Ship</button>
                                    </div>
                                    <div id="box_${orderKey}_${index}" class="partial-input-box" onclick="event.stopPropagation()">
                                        <input type="number" id="input_${orderKey}_${index}" placeholder="কত ${unitStr} পাঠাচ্ছেন?">
                                        <button class="btn btn-blue" style="padding:8px" onclick="shipOrder('${orderKey}', ${index}, ${remaining}, false, '${unitStr}')">Confirm Partial</button>
                                    </div>
                                ` : (waitingQty === 0 ? `<div style="color:green; font-weight:bold; text-align:center; font-size:13px; margin-top:10px;">✅ All Deliveries Completed</div>` : '')}

                                ${historyLog ? `<div class="log-box"><b>Delivery History:</b>${historyLog}</div>` : ''}
                            </div>
                        `;
                    }
                });

                if(hasPart) {
                    container.innerHTML += `
                        <div class="order-group-card ${isBrandNew ? 'new-order' : ''}" onclick="toggleOrder('${orderKey}')">
                            <div class="group-header">
                                <div>
                                    <div class="group-id">#Order ${d.orderId || '0000'} ${isBrandNew ? '<span class="new-badge">NEW</span>' : ''}</div>
                                    <div class="group-item">${order.itemName}</div>
                                </div>
                                <span style="font-size:12px; color:#666;">ট্যাপ করুন ▾</span>
                            </div>
                            <div class="breakdown-section" id="details-${orderKey}">
                                <div class="admin-details">
                                    <b>Brand:</b> ${d.brand || 'N/A'} | <b>Program:</b> ${d.program || 'N/A'}<br>
                                    <b>Piece/Set:</b> ${d.pieceSet || 'N/A'} | <b>Unit:</b> ${unitStr}<br>
                                    <b>Specs:</b> ${d.specs || '-'}
                                </div>
                                ${breakdownsHTML}
                            </div>
                        </div>
                    `;
                }
            });
        });
    }

    window.showPartialBox = (id) => {
        const box = document.getElementById('box_' + id);
        box.style.display = box.style.display === 'block' ? 'none' : 'block';
    };

    window.shipOrder = async (orderKey, index, remaining, isFull, unit) => {
        // ট্রান্সপোর্ট টাইপ ভ্যালিডেশন
        const tType = document.getElementById(`transport_${orderKey}_${index}`).value;
        if(!tType) return alert("দয়া করে আগে ট্রান্সপোর্ট টাইপ সিলেক্ট করুন!");

        let shipAmount = 0;
        if(isFull) shipAmount = remaining;
        else {
            const input = document.getElementById(`input_${orderKey}_${index}`);
            shipAmount = parseFloat(input.value) || 0;
        }

        if(shipAmount <= 0 || shipAmount > remaining) return alert("সঠিক পরিমাণ দিন");

        if(confirm(`${shipAmount} ${unit} (${tType}) শিপমেন্ট পাঠাচ্ছেন? এটি অফিসারের কনফার্মেশনের পর আপডেট হবে।`)) {
            const orderRef = ref(db, `grouped_orders/${orderKey}/breakdown/${index}`);
            const snap = await get(orderRef);
            const currentData = snap.val();
            
            const currentWaiting = parseFloat(currentData.waitingQty) || 0;
            const newWaiting = currentWaiting + shipAmount;
            
            const updates = {};
            updates[`grouped_orders/${orderKey}/breakdown/${index}/waitingQty`] = newWaiting;
            updates[`grouped_orders/${orderKey}/breakdown/${index}/deliveryStatus`] = "Shipped";
            updates[`grouped_orders/${orderKey}/breakdown/${index}/transportType`] = tType; // ফায়ারবেসে সেভ হচ্ছে
            
            update(ref(db), updates).then(() => {
                alert("শিপমেন্ট রিকোয়েস্ট পাঠানো হয়েছে। অফিসার কনফার্ম করলে ড্যাশবোর্ডে যোগ হবে।");
                if(!isFull) document.getElementById(`box_${orderKey}_${index}`).style.display = 'none';
            });
        }
    };

    window.logout = () => { localStorage.removeItem('vendorMobile'); location.reload(); };

    window.onload = () => {
        const saved = localStorage.getItem('vendorMobile');
        if(saved) {
            get(ref(db, 'vendors/' + saved)).then(snap => {
                if(snap.exists()) showDashboard(snap.val().name, saved);
            });
        }
    };
</script>
</body>
</html>
