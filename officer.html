<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point Officer Dashboard</title>
    <style>
        body{ font-family: 'Segoe UI', Tahoma, sans-serif; background: #eef2f3; margin: 0; padding: 0; }
        .navbar { background: #2c3e50; display: flex; justify-content: space-around; position: sticky; top: 0; z-index: 1000; }
        .nav-btn { color: white; padding: 15px; border: none; background: none; cursor: pointer; font-weight: bold; width: 50%; border-bottom: 3px solid transparent; }
        .nav-btn.active { border-bottom: 3px solid #f39c12; color: #f39c12; }
        
        .container{ max-width: 500px; margin: auto; padding: 15px; }
        .card{ background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h2, h3{ color: #2c3e50; text-align: center; margin-top: 0; }
        input, select{ width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .btn{ width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-dark{ background: #2c3e50; color: white; }
        .btn-receive{ background: #f39c12; color: white; margin-top: 10px; box-shadow: 0 4px 0 #d35400; }
        .btn-distribute{ background: #27ae60; color: white; margin-top: 10px; box-shadow: 0 4px 0 #1e8449; }
        .btn-logout{ background: #eee; color: #333; margin-top: 20px; font-size: 14px; }
        
        /* Table Styles for History */
        .history-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        .history-table th, .history-table td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .history-table th { background: #f8f9fa; color: #2c3e50; }
        .badge { background: #e67e22; color: white; padding: 2px 6px; border-radius: 4px; font-size: 12px; }

        .receive-card{ border: 1px solid #d1d1d1; padding: 15px; background: #fff; border-radius: 12px; margin-top: 15px; }
        .receive-header{ display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .item-title{ font-size: 18px; font-weight: bold; color: #2c3e50; }
        .qty-label{ background: #2c3e50; color: white; padding: 4px 12px; border-radius: 20px; font-size: 14px; }
        
        .status-msg { padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 14px; margin-top: 10px; }
        .already-received { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
        .not-sent { background: #f5f5f5; color: #888; border: 1px dashed #ccc; }
        
        .stock-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; font-weight: bold; }
        #oDashboard, #distTab { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

<div class="container" id="loginBox">
    <div class="card">
        <h2>👮 অফিসার লগইন</h2>
        <input type="text" id="oAuthMobile" placeholder="মোবাইল নম্বর দিন" maxlength="11">
        <button class="btn btn-dark" onclick="officerLogin()">লগইন করুন</button>
    </div>
</div>

<div id="oDashboard">
    <div class="navbar">
        <button class="nav-btn active" onclick="switchTab(event, 'receiveTab')">📥 রিসিভ</button>
        <button class="nav-btn" onclick="switchTab(event, 'distTab')">📤 ডিস্ট্রিবিউশন</button>
    </div>

    <div class="container">
        <!-- রিসিভ ট্যাব -->
        <div id="receiveTab" class="tab-content active">
            <div class="card" style="background: #2c3e50; color: white; text-align: center;">
                <h3 id="oWelcome" style="margin:0;">স্বাগতম</h3>
                <p id="oLocation" style="margin:5px 0 0 0; opacity: 0.8; font-size: 13px;"></p>
            </div>
            <h3>🚚 আগত মালামাল</h3>
            <div id="incomingGoods"></div>
        </div>

        <!-- ডিস্ট্রিবিউশন ট্যাব -->
        <div id="distTab" class="tab-content">
            <div class="card">
                <h3>📦 নতুন ডিস্ট্রিবিউশন</h3>
                <div id="myStockSummary"></div>
                <hr>
                <select id="distItemSelect"><option value="">আইটেম লোড হচ্ছে...</option></select>
                <input type="text" id="distTo" placeholder="কাকে দিচ্ছেন?">
                <input type="number" id="distQty" placeholder="কতটুকু দিচ্ছেন?">
                <button class="btn btn-distribute" onclick="processDistribute()">ডিস্ট্রিবিউশন কনফার্ম</button>
            </div>

            <div class="card">
                <h3>📜 ডিস্ট্রিবিউশন হিস্ট্রি</h3>
                <div style="overflow-x:auto;">
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th>তারিখ</th>
                                <th>আইটেম</th>
                                <th>পরিমাণ</th>
                                <th>প্রাপক</th>
                            </tr>
                        </thead>
                        <tbody id="distHistoryBody">
                            <!-- হিস্ট্রি এখানে লোড হবে -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <button class="btn btn-logout" onclick="logout()">লগআউট</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, get, update, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://my-supply-chain-7a286-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentStock = {};

    window.switchTab = (evt, tabId) => {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).style.display = 'block';
        evt.currentTarget.classList.add('active');
    };

    window.officerLogin = async () => {
        const mobile = document.getElementById('oAuthMobile').value;
        const oSnap = await get(ref(db, 'points/' + mobile));
        if(oSnap.exists()){
            localStorage.setItem('officerMobile', mobile);
            showDashboard(oSnap.val().name, oSnap.val().address);
        } else { alert("অফিসার পাওয়া যায়নি!"); }
    };

    function showDashboard(pName, address) {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('oDashboard').style.display = 'block';
        document.getElementById('oWelcome').innerText = "📍 " + pName;
        document.getElementById('oLocation').innerText = address;
        loadData();
    }

    function loadData() {
        const pMobile = localStorage.getItem('officerMobile');

        // ১. রিসিভ ও স্টক লোড
        onValue(ref(db, 'grouped_orders'), async (snap) => {
            const container = document.getElementById('incomingGoods');
            container.innerHTML = "";
            let tempStock = {};

            if(snap.exists()){
                snap.forEach(child => {
                    const order = child.val();
                    order.breakdown.forEach((b, index) => {
                        if(b.pKey === pMobile) {
                            if(b.receiveStatus === "Received") {
                                tempStock[order.itemName] = (tempStock[order.itemName] || 0) + parseFloat(b.qty);
                            }
                            // UI রেন্ডার আগের মতোই...
                            const vendorSent = b.deliveryStatus === "Delivered";
                            const alreadyReceived = b.receiveStatus === "Received";
                            let statusUI = alreadyReceived ? 
                                `<div class="status-msg already-received">✅ রিসিভ করা হয়েছে</div>` :
                                (vendorSent ? `<button class="btn btn-receive" onclick="confirmReceive('${child.key}', ${index})">📦 মাল বুঝে পেলাম</button>` : `<div class="status-msg not-sent">⏳ ভেন্ডর পাঠায়নি</div>`);
                            
                            container.innerHTML += `<div class="receive-card"><div class="receive-header"><span class="item-title">${order.itemName}</span><span class="qty-label">${b.qty} pc</span></div>${statusUI}</div>`;
                        }
                    });
                });
            }

            // ২. ডিস্ট্রিবিউশন ডাটা ও হিস্ট্রি লোড
            onValue(ref(db, 'distributions/' + pMobile), (dSnap) => {
                const historyBody = document.getElementById('distHistoryBody');
                historyBody.innerHTML = "";
                let distItems = [];

                if(dSnap.exists()){
                    dSnap.forEach(d => {
                        const val = d.val();
                        // স্টক থেকে বিয়োগ
                        if(tempStock[val.item]) tempStock[val.item] -= parseFloat(val.qty);
                        distItems.push(val);
                    });
                }
                
                // হিস্ট্রি টেবিল সাজানো (লেটেস্ট আগে)
                distItems.reverse().forEach(row => {
                    historyBody.innerHTML += `<tr>
                        <td>${row.date.split(',')[0]}</td>
                        <td>${row.item}</td>
                        <td><span class="badge">${row.qty}</span></td>
                        <td>${row.to}</td>
                    </tr>`;
                });

                currentStock = tempStock;
                updateStockUI();
            });
        });
    }

    function updateStockUI() {
        const summary = document.getElementById('myStockSummary');
        const select = document.getElementById('distItemSelect');
        summary.innerHTML = "";
        select.innerHTML = '<option value="">আইটেম বেছে নিন</option>';
        for(let item in currentStock) {
            if(currentStock[item] > 0) {
                summary.innerHTML += `<div class="stock-row"><span>${item}</span><span>${currentStock[item]} পিস</span></div>`;
                select.innerHTML += `<option value="${item}">${item}</option>`;
            }
        }
    }

    window.confirmReceive = (orderKey, idx) => {
        if(confirm("আপনি কি মাল বুঝে পেয়েছেন?")){
            const up = {};
            up[`grouped_orders/${orderKey}/breakdown/${idx}/receiveStatus`] = "Received";
            up[`grouped_orders/${orderKey}/breakdown/${idx}/receivedAt`] = new Date().toLocaleString();
            update(ref(db), up);
        }
    };

    window.processDistribute = () => {
        const item = document.getElementById('distItemSelect').value;
        const to = document.getElementById('distTo').value;
        const qty = parseFloat(document.getElementById('distQty').value);
        if(!item || !to || !qty || qty > currentStock[item]) return alert("সঠিক তথ্য দিন বা স্টক চেক করুন");

        const data = { item, to, qty, date: new Date().toLocaleString() };
        push(ref(db, 'distributions/' + localStorage.getItem('officerMobile')), data).then(() => {
            alert("ডিস্ট্রিবিউশন সফল!");
            document.getElementById('distTo').value = "";
            document.getElementById('distQty').value = "";
        });
    };

    window.logout = () => { localStorage.clear(); location.reload(); };
    window.onload = () => {
        const saved = localStorage.getItem('officerMobile');
        if(saved) get(ref(db, 'points/' + saved)).then(s => s.exists() && showDashboard(s.val().name, s.val().address));
    };
</script>
</body>
</html>
