<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point Officer Dashboard - Professional v2.2</title>
    <style>
        body{ font-family: 'Segoe UI', Tahoma, sans-serif; background: #eef2f3; margin: 0; padding: 0; }
        .navbar { background: #2c3e50; display: flex; justify-content: space-around; position: sticky; top: 0; z-index: 1000; }
        .nav-btn { color: white; padding: 15px; border: none; background: none; cursor: pointer; font-weight: bold; width: 50%; border-bottom: 3px solid transparent; }
        .nav-btn.active { border-bottom: 3px solid #f39c12; color: #f39c12; }
        
        .container{ max-width: 500px; margin: auto; padding: 15px; }
        .card{ background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h2, h3{ color: #2c3e50; text-align: center; margin-top: 0; }
        label { font-size: 13px; color: #7f8c8d; font-weight: bold; margin-left: 5px; }
        input, select{ width: 100%; padding: 12px; margin: 8px 0 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .btn{ width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-dark{ background: #2c3e50; color: white; }
        .btn-receive{ background: #f39c12; color: white; margin-top: 10px; box-shadow: 0 4px 0 #d35400; }
        .btn-distribute{ background: #27ae60; color: white; margin-top: 10px; box-shadow: 0 4px 0 #1e8449; }
        .btn-logout{ background: #eee; color: #333; margin-top: 20px; font-size: 14px; width: 100%; }
        
        /* New Grouped Stock Styling */
        .prog-group { border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; overflow: hidden; }
        .prog-header { background: #34495e; color: white; padding: 10px 15px; font-weight: bold; font-size: 15px; display: flex; justify-content: space-between; }
        .item-row { background: white; padding: 10px 15px; border-bottom: 1px solid #eee; display: flex; flex-direction: column; }
        .item-name { font-weight: bold; color: #2c3e50; margin-bottom: 5px; font-size: 14px; }
        .item-stats { display: flex; justify-content: space-between; font-size: 12px; color: #7f8c8d; }
        .stat-box { text-align: center; flex: 1; border-right: 1px solid #f0f0f0; }
        .stat-box:last-child { border-right: none; }
        .stat-val { display: block; font-weight: bold; font-size: 13px; margin-top: 2px; }
        .val-stock { color: #27ae60; }
        .val-dist { color: #e74c3c; }
        .val-total { color: #2980b9; }

        .receive-card{ border: 1px solid #d1d1d1; padding: 15px; background: #fff; border-radius: 12px; margin-top: 15px; border-left: 5px solid #f39c12; position: relative; }
        .program-badge { background: #34495e; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-bottom: 5px; display: inline-block; }
        .item-title { font-size: 16px; font-weight: bold; color: #2c3e50; display: block; }
        
        #detailsModal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: white; margin: 15% auto; padding: 25px; width: 85%; max-width: 400px; border-radius: 15px; }
        .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        .detail-label { font-weight: bold; color: #7f8c8d; }

        .status-msg { padding: 20px; text-align: center; color: #888; font-style: italic; }
        #oDashboard, #distTab { display: none; }
    </style>
</head>
<body>

<div id="detailsModal">
    <div class="modal-content">
        <h3>📄 মালের বিস্তারিত বিবরণ</h3>
        <div id="modalBody"></div>
        <button class="btn btn-receive" id="modalConfirmBtn">সব ঠিক আছে, রিসিভ করুন</button>
        <button class="btn" style="background:#eee; margin-top:10px; color:#333;" onclick="closeModal()">বন্ধ করুন</button>
    </div>
</div>

<div class="container" id="loginBox">
    <div class="card">
        <h2>👮 অফিসার লগইন</h2>
        <input type="text" id="oAuthMobile" placeholder="মোবাইল নম্বর দিন (১১ ডিজিট)" maxlength="11">
        <button class="btn btn-dark" onclick="officerLogin()">লগইন করুন</button>
    </div>
</div>

<div id="oDashboard">
    <div class="navbar">
        <button class="nav-btn active" id="btnRec" onclick="switchTab('receiveTab')">📥 রিসিভ</button>
        <button class="nav-btn" id="btnDist" onclick="switchTab('distTab')">📤 ডিস্ট্রিবিউশন</button>
    </div>

    <div class="container">
        <div id="receiveTab" class="tab-content" style="display: block;">
            <div class="card" style="background: #2c3e50; color: white; text-align: center;">
                <h3 id="oWelcome" style="margin:0; color: white;">স্বাগতম</h3>
                <p id="oLocation" style="margin:5px 0 0 0; opacity: 0.8; font-size: 13px;"></p>
            </div>
            <h3>🚚 আগত মালামাল (Waiting)</h3>
            <div id="incomingGoods"></div>
        </div>

        <div id="distTab" class="tab-content" style="display: none;">
            <div class="card">
                <h3>📦 মাল ডিস্ট্রিবিউশন</h3>
                <label>১. প্রোগ্রাম নির্বাচন করুন:</label>
                <select id="distProgramSelect" onchange="filterProductsByProgram()">
                    <option value="">প্রোগ্রাম লোড হচ্ছে...</option>
                </select>

                <label>২. প্রোডাক্ট নির্বাচন করুন:</label>
                <select id="distItemSelect">
                    <option value="">আগে প্রোগ্রাম বেছে নিন</option>
                </select>

                <label>৩. প্রাপকের নাম/আইডি:</label>
                <input type="text" id="distTo" placeholder="কাকে দিচ্ছেন?">
                
                <label>৪. পরিমাণ:</label>
                <input type="number" id="distQty" placeholder="কতটুকু দিচ্ছেন?">
                
                <button class="btn btn-distribute" onclick="processDistribute()">ডিস্ট্রিবিউশন কনফার্ম</button>
            </div>
            
            <div class="card" style="padding: 15px 10px;">
                <h3>📊 স্টক ও বিতরণ রিপোর্ট</h3>
                <div id="myStockSummary"></div>
            </div>
        </div>
        <button class="btn btn-logout" onclick="logout()">লগআউট</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, get, update, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://my-supply-chain-7a286-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let fullStockData = {}; 
    let receiveData = {}; // মোট কত রিসিভ হলো
    let distributedData = {}; // মোট কত বিলি হলো

    window.switchTab = (tabId) => {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).style.display = 'block';
        document.getElementById(tabId === 'receiveTab' ? 'btnRec' : 'btnDist').classList.add('active');
    };

    window.officerLogin = async () => {
        const mobile = document.getElementById('oAuthMobile').value;
        if(mobile.length < 11) return alert("সঠিক মোবাইল নম্বর দিন");
        const oSnap = await get(ref(db, 'points/' + mobile));
        if(oSnap.exists()){
            localStorage.setItem('officerMobile', mobile);
            showDashboard(oSnap.val().name, oSnap.val().address);
        } else { alert("অফিসার পাওয়া যায়নি!"); }
    };

    function showDashboard(pName, address) {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('oDashboard').style.display = 'block';
        document.getElementById('oWelcome').innerText = "📍 " + pName;
        document.getElementById('oLocation').innerText = address;
        loadData();
    }

    function loadData() {
        const pMobile = localStorage.getItem('officerMobile');
        onValue(ref(db, 'grouped_orders'), (snap) => {
            const container = document.getElementById('incomingGoods');
            container.innerHTML = "";
            let tempTotalReceive = {}; // মোট আসা মাল
            let hasIncoming = false;

            if(snap.exists()){
                snap.forEach(child => {
                    const order = child.val();
                    const orderKey = child.key;
                    const prog = (order.details && order.details.program) ? order.details.program : "সাধারণ";

                    if(order.breakdown) {
                        order.breakdown.forEach((b, index) => {
                            if(b.pKey === pMobile) {
                                // রিসিভ হওয়া মালের হিসাব
                                if(!tempTotalReceive[prog]) tempTotalReceive[prog] = {};
                                const confirmed = parseFloat(b.sentQty) || 0;
                                tempTotalReceive[prog][order.itemName] = (tempTotalReceive[prog][order.itemName] || 0) + confirmed;

                                // ওয়েটিং মালের হিসাব (কার্ড দেখানোর জন্য)
                                const directWaiting = parseFloat(b.waitingQty) || 0;
                                if(directWaiting > 0) {
                                    hasIncoming = true;
                                    container.innerHTML += renderCard(order, b, index, orderKey, "Direct", directWaiting, prog);
                                }
                                if(b.waitingLogs) {
                                    Object.keys(b.waitingLogs).forEach(logId => {
                                        if(b.waitingLogs[logId].status === 'pending') {
                                            hasIncoming = true;
                                            container.innerHTML += renderCard(order, b, index, orderKey, logId, b.waitingLogs[logId].amount, prog);
                                        }
                                    });
                                }
                            }
                        });
                    }
                });
            }
            receiveData = tempTotalReceive;
            if(!hasIncoming) container.innerHTML = `<div class="status-msg">⏳ কোনো আগত মাল নেই</div>`;

            // ডিস্ট্রিবিউশন ডাটা লোড
            onValue(ref(db, 'distributions/' + pMobile), (dSnap) => {
                let tempDist = {};
                if(dSnap.exists()){
                    dSnap.forEach(d => {
                        const val = d.val();
                        if(!tempDist[val.program]) tempDist[val.program] = {};
                        tempDist[val.program][val.item] = (tempDist[val.program][val.item] || 0) + parseFloat(val.qty);
                    });
                }
                distributedData = tempDist;
                calculateFinalStock();
            });
        });
    }

    function calculateFinalStock() {
        let finalStock = {};
        for(let prog in receiveData) {
            finalStock[prog] = {};
            for(let item in receiveData[prog]) {
                const received = receiveData[prog][item] || 0;
                const distributed = (distributedData[prog] && distributedData[prog][item]) ? distributedData[prog][item] : 0;
                finalStock[prog][item] = received - distributed;
            }
        }
        fullStockData = finalStock;
        updateProgramDropdown();
        updateStockUI();
    }

    function updateStockUI() {
        const summary = document.getElementById('myStockSummary');
        summary.innerHTML = "";
        let hasData = false;

        for(let prog in receiveData) {
            hasData = true;
            let progHTML = `
                <div class="prog-group">
                    <div class="prog-header">
                        <span>📋 ${prog}</span>
                    </div>`;
            
            for(let item in receiveData[prog]) {
                const total = receiveData[prog][item];
                const dist = (distributedData[prog] && distributedData[prog][item]) ? distributedData[prog][item] : 0;
                const stock = total - dist;

                progHTML += `
                    <div class="item-row">
                        <span class="item-name">${item}</span>
                        <div class="item-stats">
                            <div class="stat-box">মোট রিসিভ<span class="stat-val val-total">${total}</span></div>
                            <div class="stat-box">বিতরণ<span class="stat-val val-dist">${dist}</span></div>
                            <div class="stat-box">স্টকে আছে<span class="stat-val val-stock">${stock}</span></div>
                        </div>
                    </div>`;
            }
            progHTML += `</div>`;
            summary.innerHTML += progHTML;
        }

        if(!hasData) summary.innerHTML = "<p class='status-msg'>কোনো ডাটা পাওয়া যায়নি</p>";
    }

    function renderCard(order, b, index, orderKey, logId, amount, progName) {
        return `
            <div class="receive-card">
                <span class="program-badge">${progName}</span>
                <span class="item-title">${order.itemName}</span>
                <div style="font-size:13px; color:#e67e22; margin:5px 0;">ভেন্ডর পাঠিয়েছে: <b>${amount}</b></div>
                <button class="btn btn-receive" style="padding:10px; font-size:14px;" 
                    onclick="openDetails('${orderKey}', ${index}, '${logId}', ${amount})">
                    🔍 বিস্তারিত ও রিসিভ
                </button>
            </div>`;
    }

    window.openDetails = async (orderKey, idx, logId, amount) => {
        const snap = await get(ref(db, `grouped_orders/${orderKey}`));
        const order = snap.val();
        const prog = (order.details && order.details.program) ? order.details.program : "সাধারণ";
        const modalBody = document.getElementById('modalBody');
        modalBody.innerHTML = `
            <div class="detail-row"><span class="detail-label">আইটেম:</span> <span>${order.itemName}</span></div>
            <div class="detail-row"><span class="detail-label">প্রোগ্রাম:</span> <span>${prog}</span></div>
            <div class="detail-row"><span class="detail-label">পরিমাণ:</span> <span style="color:#f39c12; font-weight:bold;">${amount}</span></div>
        `;
        document.getElementById('detailsModal').style.display = 'block';
        document.getElementById('modalConfirmBtn').onclick = () => confirmReceive(orderKey, idx, logId, amount);
    };

    async function confirmReceive(orderKey, idx, logId, amount) {
        if(confirm(`আপনি কি ${amount} পরিমাণ মাল রিসিভ করতে নিশ্চিত?`)){
            const updates = {};
            const path = `grouped_orders/${orderKey}/breakdown/${idx}`;
            if(logId === "Direct") updates[`${path}/waitingQty`] = 0;
            else updates[`${path}/waitingLogs/${logId}/status`] = 'received';
            const currentSentSnap = await get(ref(db, `${path}/sentQty`));
            const currentSent = parseFloat(currentSentSnap.val()) || 0;
            updates[`${path}/sentQty`] = currentSent + parseFloat(amount);
            updates[`${path}/deliveryLogs/${Date.now()}`] = { date: new Date().toLocaleString('bn-BD'), amount: amount };
            update(ref(db), updates).then(() => { closeModal(); alert("মাল রিসিভ হয়েছে!"); });
        }
    }

    function updateProgramDropdown() {
        const progSelect = document.getElementById('distProgramSelect');
        const currentVal = progSelect.value;
        progSelect.innerHTML = '<option value="">প্রোগ্রাম বেছে নিন</option>';
        for (let prog in fullStockData) {
            progSelect.innerHTML += `<option value="${prog}">${prog}</option>`;
        }
        if(currentVal) progSelect.value = currentVal;
    }

    window.filterProductsByProgram = () => {
        const selectedProg = document.getElementById('distProgramSelect').value;
        const itemSelect = document.getElementById('distItemSelect');
        itemSelect.innerHTML = '<option value="">প্রোডাক্ট বেছে নিন</option>';
        if(selectedProg && fullStockData[selectedProg]) {
            for(let item in fullStockData[selectedProg]) {
                if(fullStockData[selectedProg][item] > 0) {
                    itemSelect.innerHTML += `<option value="${item}">${item} (স্টক: ${fullStockData[selectedProg][item]})</option>`;
                }
            }
        }
    }

    window.processDistribute = () => {
        const prog = document.getElementById('distProgramSelect').value;
        const item = document.getElementById('distItemSelect').value;
        const to = document.getElementById('distTo').value;
        const qty = parseFloat(document.getElementById('distQty').value);
        if(!prog || !item || !to || !qty || qty > fullStockData[prog][item]) return alert("সঠিক তথ্য দিন অথবা পর্যাপ্ত স্টক আছে কি না চেক করুন");
        const data = { program: prog, item: item, to: to, qty: qty, date: new Date().toLocaleString('bn-BD') };
        push(ref(db, 'distributions/' + localStorage.getItem('officerMobile')), data).then(() => {
            alert("ডিস্ট্রিবিউশন সফল!");
            document.getElementById('distTo').value = "";
            document.getElementById('distQty').value = "";
            filterProductsByProgram();
        });
    };

    window.closeModal = () => document.getElementById('detailsModal').style.display = 'none';
    window.logout = () => { localStorage.clear(); location.reload(); };

    window.onload = () => {
        const saved = localStorage.getItem('officerMobile');
        if(saved) get(ref(db, 'points/' + saved)).then(s => { if(s.exists()) showDashboard(s.val().name, s.val().address); });
    };
</script>
</body>
</html>
